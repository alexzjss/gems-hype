<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RED PANDA INVADERS</title>
  <style>
    /* Reset e configuração base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      color: #fff;
    }
    canvas {
      display: block;
      background: #000;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    // === 1. NOVA MECÂNICA ===
    /* NOVA MECÂNICA: MODO HYPE & GEMAS BOSS — Acumule kills sem tomar dano para disparar um laser de bambu massivo. Colete gemas na última fase para virar o Panda Gigante. */

    // === 2. CONFIG ===
    const CONFIG = {
      WIDTH: 480, HEIGHT: 640,
      RUBI_SPEED: 3.5, BULLET_SPEED: 9, ENEMY_BULLET_SPEED: 4,
      H_GAP: 10, V_GAP: 12
    };

    // === 3. STATE ===
    const STATE = {
      screen: 'MENU', // MENU, PLAYING, PHASE_CLEAR, GAME_OVER, VICTORY
      score: 0,
      highScore: localStorage.getItem('rpi_hs') || 0,
      lives: 3, phase: 1,
      frames: 0,
      hypeKills: 0, hypeActive: false, hypeTimer: 0,
      phaseTimer: 0,
      giantMode: false, gemsCollected: 0
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
      const scale = Math.min(window.innerWidth / CONFIG.WIDTH, window.innerHeight / CONFIG.HEIGHT);
      canvas.width = CONFIG.WIDTH;
      canvas.height = CONFIG.HEIGHT;
      canvas.style.width = `${CONFIG.WIDTH * scale}px`;
      canvas.style.height = `${CONFIG.HEIGHT * scale}px`;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // === 4. AUDIO ===
    let audioCtx = null;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playSound(freq1, freq2, duration, wave='square', vol=0.2) {
      if (!audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = wave;
        osc.frequency.setValueAtTime(freq1, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(Math.max(1, freq2), audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch(e){}
    }

    // === 5. UTILS & MATH ===
    function collides(a, b) {
      return a.x < b.x + (b.w||b.size) && a.x + (a.w||a.size) > b.x &&
             a.y < b.y + (b.h||b.size) && a.y + (a.h||a.size) > b.y;
    }
    
    // === 6. EFFECTS & PARTICLES ===
    let particles = [];
    let floatingTexts = [];
    const screenShake = { x: 0, y: 0, intensity: 0 };
    let flash = { alpha: 0, color: '#fff' };

    function spawnParticles(x, y, color, count=8) {
      for(let i=0; i<count; i++) {
        particles.push({
          x: x, y: y,
          vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4 - 1,
          life: 1.0, color: color, size: Math.random()*3 + 2
        });
      }
    }
    function spawnText(x, y, text, color) {
      floatingTexts.push({x, y, text, color, life: 1.0, vy: -1.5});
    }
    function triggerShake(intensity) { screenShake.intensity = intensity; }
    function triggerFlash(color='#fff', alpha=0.8) { flash.color = color; flash.alpha = alpha; }

    function updateEffects(dt) {
      if(screenShake.intensity > 0) {
        screenShake.x = (Math.random()-0.5) * screenShake.intensity;
        screenShake.y = (Math.random()-0.5) * screenShake.intensity;
        screenShake.intensity *= 0.85;
        if(screenShake.intensity < 0.1) screenShake.intensity = 0;
      }
      if(flash.alpha > 0) flash.alpha -= 0.05 * dt;
      
      for(let i=particles.length-1; i>=0; i--) {
        let p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.life -= 0.05 * dt;
        if(p.life <= 0) particles.splice(i, 1);
      }
      for(let i=floatingTexts.length-1; i>=0; i--) {
        let ft = floatingTexts[i];
        ft.y += ft.vy * dt; ft.life -= 0.02 * dt;
        if(ft.life <= 0) floatingTexts.splice(i, 1);
      }
    }

    // === 7. ENTITIES & SYSTEMS ===
    
    const player = {
      x: CONFIG.WIDTH/2, y: CONFIG.HEIGHT - 60, w: 24, h: 24,
      cooldown: 0, invuln: 0,
      buffs: { big: 0, spread: 0, shield: 0, clone: 0 }
    };

    let bullets = [];
    let powerups = [];
    let grid = { x: 0, y: 80, speedX: 0, dir: 1, enemies: [], shootTimer: 0, shootInterval: 1500 };
    let boss = null;
    let barriers = [];

    function initBarriers() {
      barriers = [];
      const xs = [CONFIG.WIDTH*0.15, CONFIG.WIDTH*0.35, CONFIG.WIDTH*0.65, CONFIG.WIDTH*0.85];
      xs.forEach(bx => {
        let b = { active: true, blocks: [] };
        for(let r=0; r<2; r++) {
          for(let c=0; c<3; c++) {
            b.blocks.push({ x: bx - 20 + c*14, y: CONFIG.HEIGHT - 120 + r*15, w: 14, h: 15, hp: 2 });
          }
        }
        barriers.push(b);
      });
    }

    function initPhase(p) {
      STATE.phase = p;
      bullets = []; powerups = [];
      grid.enemies = [];
      player.x = CONFIG.WIDTH/2;
      player.buffs = { big: 0, spread: 0, shield: 0, clone: 0 };
      STATE.hypeKills = 0; STATE.hypeActive = false;
      STATE.giantMode = false; STATE.gemsCollected = 0;
      boss = null;
      initBarriers();

      if(p < 4) {
        let cols = p === 3 ? 10 : 9;
        let rows = 4;
        let ew = 36, eh = 28;
        grid.x = (CONFIG.WIDTH - (cols * (ew + CONFIG.H_GAP))) / 2;
        grid.y = 80;
        grid.dir = 1;
        grid.speedX = p === 1 ? 0.8 : (p === 2 ? 1.0 : 1.2);
        grid.shootInterval = p === 1 ? 1500 : (p === 2 ? 1200 : 1000);
        grid.shootTimer = 0;

        for(let r=0; r<rows; r++) {
          for(let c=0; c<cols; c++) {
            let type = r < 2 ? 'front' : 'back';
            let hp = (p === 3 && type === 'back') ? 2 : 1;
            grid.enemies.push({ c, r, w: ew, h: eh, alive: true, type, hp, initialHp: hp });
          }
        }
      } else {
        boss = { x: CONFIG.WIDTH/2, y: 120, w: 160, h: 100, hp: 60, maxHp: 60, speed: 1.5, dir: 1, timer: 0, gemsSpawned: 0 };
      }
    }

    // === 8. INPUT ===
    const keys = {};
    window.addEventListener('keydown', e => { 
      keys[e.code] = true; keys[e.key] = true; 
      initAudio();
      if(e.code === 'Space') e.preventDefault();
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; keys[e.key] = false; });

    // === 9. DRAWING ROUTINES ===
    
    function drawRubi(ctx, px, py, isGiant, frame, isClone=false) {
      ctx.save();
      ctx.translate(px, py);
      if(isGiant) ctx.scale(2, 2);
      if(isClone) ctx.globalAlpha = 0.6;
      
      // Cauda
      ctx.fillStyle = '#DD4422';
      ctx.beginPath(); ctx.ellipse(15, 8, 12, 6, -0.5, 0, Math.PI*2); ctx.fill();
      // Corpo
      ctx.fillStyle = '#AA2200';
      ctx.beginPath(); ctx.ellipse(0, 4, 18, 12, 0, 0, Math.PI*2); ctx.fill();
      // Orelhas
      ctx.beginPath(); ctx.moveTo(-10, -18); ctx.lineTo(-4, -10); ctx.lineTo(-14, -8); ctx.fill();
      ctx.beginPath(); ctx.moveTo(10, -18); ctx.lineTo(4, -10); ctx.lineTo(14, -8); ctx.fill();
      // Cabeça
      ctx.beginPath(); ctx.arc(0, -8, 12, 0, Math.PI*2); ctx.fill();
      // Focinho
      ctx.fillStyle = '#F5DEB3';
      ctx.beginPath(); ctx.ellipse(0, -4, 6, 4, 0, 0, Math.PI*2); ctx.fill();
      // Olhos e Danos
      ctx.fillStyle = '#000';
      if(player.invuln > 0 && Math.floor(STATE.frames/5)%2 === 0) {
        ctx.fillRect(-6, -11, 4, 2); ctx.fillRect(2, -11, 4, 2); // olhos fechados
      } else {
        ctx.beginPath(); ctx.arc(-4, -10, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(4, -10, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-5, -11, 1, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(3, -11, 1, 0, Math.PI*2); ctx.fill();
      }
      // Escudo
      if(player.buffs.shield > 0) {
        ctx.strokeStyle = '#00FFFF'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, 26, Math.PI, Math.PI*2); ctx.stroke();
      }
      ctx.restore();
    }

    function drawEnemy(ctx, ex, ey, type, phase, hp, time) {
      ctx.save();
      ctx.translate(ex + 18, ey + 14); // Centro
      if(phase === 1) {
        if(type === 'front') { // Cadeira
          let glitch = (time%90 < 6) ? 2 : 0;
          ctx.translate(glitch, Math.sin(time*0.1)*2);
          ctx.fillStyle = '#8B6914';
          ctx.fillRect(-10, 2, 20, 8); // assento
          ctx.fillRect(-8, -12, 16, 14); // encosto
        } else { // Mesa + PC
          ctx.fillStyle = '#8B6914';
          ctx.fillRect(-16, 0, 32, 6);
          ctx.fillRect(-14, 6, 4, 8); ctx.fillRect(10, 6, 4, 8);
          ctx.fillStyle = (time%45 < 20) ? '#0000AA' : '#000044';
          ctx.fillRect(-7, -10, 14, 10); // tela
          ctx.fillStyle = '#fff'; ctx.font = '8px monospace'; ctx.fillText('x_x', -7, -2);
        }
      } else if(phase === 2) {
        if(type === 'front') { // Pombo
          ctx.fillStyle = '#888';
          ctx.beginPath(); ctx.ellipse(0, 0, 12, 8, 0, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(8, -4, 5, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#FFA500';
          ctx.beginPath(); ctx.moveTo(13, -4); ctx.lineTo(18, -2); ctx.lineTo(13, 0); ctx.fill();
          let wy = (time%20 < 10) ? -6 : 6;
          ctx.fillStyle = '#666';
          ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(0, wy); ctx.lineTo(4, 0); ctx.fill();
        } else { // Rato
          ctx.fillStyle = '#555';
          ctx.beginPath(); ctx.ellipse(0, 2, 14, 8, 0, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(10, 0, 6, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#faa'; ctx.beginPath(); ctx.arc(-14, 2, 4, 0, Math.PI*2); ctx.fill(); // rabo aprox
          ctx.fillStyle = '#f00'; ctx.fillRect(12, -2, 2, 2); // olho
        }
      } else if(phase === 3) {
        // Evil Panda
        ctx.translate(Math.random()*2-1, Math.random()*2-1);
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.ellipse(0, 4, 15, 10, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(0, -6, 10, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#f00'; ctx.fillRect(-4, -8, 3, 2); ctx.fillRect(2, -8, 3, 2);
        if(type === 'back' && hp === 2) { // Armadura
          ctx.fillStyle = '#228B22';
          ctx.fillRect(-12, 0, 24, 10);
        } else if(type === 'back' && hp === 1) {
          ctx.fillStyle = '#88CC44'; // Quebrada
          ctx.fillRect(-12, 0, 10, 10); ctx.fillRect(2, 0, 10, 10);
        }
      }
      ctx.restore();
    }

    // === 10. GAME LOGIC (UPDATE) ===
    function update(dt) {
      STATE.frames++;
      
      if(STATE.screen === 'PLAYING') {
        
        // Player Movement
        let speed = CONFIG.RUBI_SPEED * dt;
        if(STATE.hypeActive) speed = 0; // Travada no Hype
        if(keys['ArrowLeft'] || keys['KeyA']) player.x -= speed;
        if(keys['ArrowRight'] || keys['KeyD']) player.x += speed;
        player.x = Math.max(24, Math.min(CONFIG.WIDTH - 24, player.x));
        
        if(player.invuln > 0) player.invuln -= dt * 16.67;
        
        // HYPE MODE
        if((keys['ShiftLeft'] || keys['ShiftRight']) && STATE.hypeKills >= 12 && !STATE.hypeActive) {
          STATE.hypeActive = true;
          STATE.hypeTimer = 2000;
          playSound(100, 1200, 0.4, 'sawtooth', 0.4);
          triggerFlash('#FFD700', 0.4);
        }

        if(STATE.hypeActive) {
          STATE.hypeTimer -= dt * 16.67;
          // Colisão do beam com inimigos
          let beamRect = { x: player.x - 10, y: 0, w: 20, h: player.y };
          
          if(boss) {
             if(collides(beamRect, boss)) damageBoss(dt * 0.5); // Dano contínuo
          } else {
            grid.enemies.forEach(e => {
              if(e.alive) {
                let ex = grid.x + e.c * (e.w + CONFIG.H_GAP);
                let ey = grid.y + e.r * (e.h + CONFIG.V_GAP);
                if(collides(beamRect, {x:ex, y:ey, w:e.w, h:e.h})) {
                   killEnemy(e, ex, ey);
                }
              }
            });
          }
          // Limpa tiros inimigos no beam
          bullets.forEach(b => {
            if(b.active && b.owner !== 'player' && collides(beamRect, b)) b.active = false;
          });

          if(STATE.hypeTimer <= 0) {
            STATE.hypeActive = false;
            STATE.hypeKills = 0;
          }
        }

        // Shooting
        player.cooldown -= dt * 16.67;
        let pcd = STATE.giantMode ? 180 : 350;
        if((keys['Space'] || keys[' ']) && player.cooldown <= 0 && !STATE.hypeActive) {
          let count = 0;
          bullets.forEach(b => { if(b.active && b.owner === 'player') count++; });
          if(count < (player.buffs.spread > 0 ? 6 : 2)) {
            player.cooldown = pcd;
            playSound(200, 120, 0.08);
            let bw = player.buffs.big > 0 ? 8 : 4;
            let bh = player.buffs.big > 0 ? 22 : 12;
            let dmg = player.buffs.big > 0 ? 2 : 1;
            
            bullets.push({x: player.x - bw/2, y: player.y - bh, vx: 0, vy: -CONFIG.BULLET_SPEED*dt, owner: 'player', w: bw, h: bh, dmg, pierce: player.buffs.big > 0});
            if(player.buffs.spread > 0) {
               bullets.push({x: player.x - bw/2, y: player.y - bh, vx: -2*dt, vy: -CONFIG.BULLET_SPEED*dt, owner: 'player', w: bw, h: bh, dmg});
               bullets.push({x: player.x - bw/2, y: player.y - bh, vx: 2*dt, vy: -CONFIG.BULLET_SPEED*dt, owner: 'player', w: bw, h: bh, dmg});
               player.buffs.spread--;
            }
            if(player.buffs.big > 0) player.buffs.big--;

            if(player.buffs.clone > 0) {
               bullets.push({x: player.x - bw/2 + 30, y: player.y - bh, vx: 0, vy: -CONFIG.BULLET_SPEED*dt, owner: 'player', w: bw, h: bh, dmg});
            }
          }
        }

        // Bullets Update
        let enemyBulletCount = 0;
        bullets.forEach(b => {
          if(!b.active) return;
          b.x += b.vx; b.y += b.vy;
          if(b.y < 0 || b.y > CONFIG.HEIGHT || b.x < 0 || b.x > CONFIG.WIDTH) b.active = false;
          if(b.owner !== 'player') enemyBulletCount++;
        });

        // Grid Update (Phases 1-3)
        if(STATE.phase < 4) {
          let alive = 0;
          let hitEdge = false;
          let maxY = 0;
          grid.enemies.forEach(e => {
            if(!e.alive) return;
            alive++;
            let ex = grid.x + e.c * (e.w + CONFIG.H_GAP);
            let ey = grid.y + e.r * (e.h + CONFIG.V_GAP);
            if(ey > maxY) maxY = ey;
            if((grid.dir === 1 && ex + e.w > CONFIG.WIDTH - 8) || (grid.dir === -1 && ex < 8)) {
              hitEdge = true;
            }
          });

          if(alive === 0) {
            startPhaseClear();
            return;
          }

          let currentSpeed = grid.speedX * (1 + (grid.enemies.length - alive) / grid.enemies.length);
          currentSpeed = Math.min(currentSpeed, 3.5);
          grid.x += currentSpeed * grid.dir * dt;

          if(hitEdge) {
            grid.dir *= -1;
            grid.y += 20;
            if(maxY + 20 > CONFIG.HEIGHT - 80) gameOver();
          }

          // Enemy Shoot
          grid.shootTimer += dt * 16.67;
          let maxEB = STATE.phase === 1 ? 4 : (STATE.phase === 2 ? 6 : 8);
          if(grid.shootTimer >= grid.shootInterval && enemyBulletCount < maxEB) {
            grid.shootTimer = 0;
            let activeCols = [];
            for(let c=0; c<10; c++) {
              let bottomMost = null;
              for(let r=0; r<4; r++) {
                let e = grid.enemies.find(en => en.c === c && en.r === r && en.alive);
                if(e) bottomMost = e;
              }
              if(bottomMost) activeCols.push(bottomMost);
            }
            if(activeCols.length > 0) {
              let shooter = activeCols[Math.floor(Math.random() * activeCols.length)];
              let ex = grid.x + shooter.c * (shooter.w + CONFIG.H_GAP) + shooter.w/2;
              let ey = grid.y + shooter.r * (shooter.h + CONFIG.V_GAP) + shooter.h;
              bullets.push({x: ex-3, y: ey, vx: 0, vy: CONFIG.ENEMY_BULLET_SPEED*dt, owner: 'enemy', w: 6, h: 6});
            }
          }
        } else if (boss) {
          // Boss Phase
          boss.x += boss.speed * boss.dir * dt;
          if(boss.x + boss.w/2 > CONFIG.WIDTH - 10) boss.dir = -1;
          if(boss.x - boss.w/2 < 10) boss.dir = 1;

          boss.timer += dt * 16.67;
          let maxEB = 10;
          
          if(boss.hp > 40) { // Chuva
            if(boss.timer > 1200 && enemyBulletCount < 6) {
               boss.timer = 0;
               for(let i=0; i<5; i++) {
                 bullets.push({x: boss.x - boss.w/2 + Math.random()*boss.w, y: boss.y + 50, vx: 0, vy: 3.5*dt, owner: 'boss', w: 6, h: 6});
               }
            }
          } else if (boss.hp > 20) { // Leque
             if(boss.timer > 1000 && enemyBulletCount < 8) {
               boss.timer = 0;
               bullets.push({x: boss.x, y: boss.y+50, vx: 0, vy: 4*dt, owner: 'boss', w: 6, h: 6});
               bullets.push({x: boss.x, y: boss.y+50, vx: -2*dt, vy: 3.5*dt, owner: 'boss', w: 6, h: 6});
               bullets.push({x: boss.x, y: boss.y+50, vx: 2*dt, vy: 3.5*dt, owner: 'boss', w: 6, h: 6});
             }
          } else { // Frenesi
             boss.speed = 2.5;
             if(boss.timer > 800 && enemyBulletCount < 10) {
               boss.timer = 0;
               [-2, -1, 0, 1, 2].forEach(vx => {
                 bullets.push({x: boss.x, y: boss.y+50, vx: vx*dt, vy: 4*dt, owner: 'boss', w: 6, h: 6});
               });
             }
          }

          // Gems Drop
          if(boss.hp <= 45 && boss.gemsSpawned === 0) { boss.gemsSpawned++; spawnGem(); }
          if(boss.hp <= 30 && boss.gemsSpawned === 1) { boss.gemsSpawned++; spawnGem(); }
          if(boss.hp <= 15 && boss.gemsSpawned === 2) { boss.gemsSpawned++; spawnGem(); }

          if(boss.hp <= 0) {
            triggerFlash('#ffffff', 0.9);
            triggerShake(10);
            playSound(400, 50, 0.8, 'sawtooth');
            score += 1000;
            startVictory();
            return;
          }
        }

        // Collisions
        bullets.forEach(b => {
          if(!b.active) return;
          
          // Player Bullets
          if(b.owner === 'player') {
             // Vs Enemies
             if(STATE.phase < 4) {
               grid.enemies.forEach(e => {
                 if(e.alive && b.active) {
                   let ex = grid.x + e.c * (e.w + CONFIG.H_GAP);
                   let ey = grid.y + e.r * (e.h + CONFIG.V_GAP);
                   if(collides(b, {x:ex, y:ey, w:e.w, h:e.h})) {
                     if(!b.pierce) b.active = false;
                     e.hp -= b.dmg;
                     if(e.hp <= 0) killEnemy(e, ex, ey);
                     else playSound(150, 200, 0.1);
                   }
                 }
               });
             } else if (boss) {
                let bossRect = {x: boss.x - boss.w/2, y: boss.y - boss.h/2, w: boss.w, h: boss.h};
                if(collides(b, bossRect)) {
                  b.active = false;
                  damageBoss(b.dmg);
                }
             }

             // Vs Barriers
             barriers.forEach(bar => {
               if(!bar.active) return;
               bar.blocks.forEach(blk => {
                 if(blk.hp > 0 && b.active && collides(b, blk)) {
                   b.active = false; blk.hp--;
                 }
               });
             });
          } else {
             // Enemy Bullets Vs Player
             let pRect = {x: player.x - player.w/2, y: player.y - player.h/2, w: player.w, h: player.h};
             let cloneRect = player.buffs.clone > 0 ? {x: pRect.x + 30, y: pRect.y, w: pRect.w, h: pRect.h} : null;

             if(collides(b, pRect) || (cloneRect && collides(b, cloneRect))) {
                b.active = false;
                if(player.buffs.shield > 0) {
                  player.buffs.shield--;
                  triggerFlash('#00FFFF', 0.4);
                  playSound(600, 800, 0.2);
                } else if (cloneRect && collides(b, cloneRect)) {
                  player.buffs.clone = 0;
                  spawnParticles(cloneRect.x+12, cloneRect.y+12, '#fff', 15);
                  playSound(150, 40, 0.3, 'sawtooth');
                } else if (player.invuln <= 0) {
                  playerHit();
                }
             }

             // Enemy Bullets Vs Barriers
             barriers.forEach(bar => {
               if(!bar.active) return;
               bar.blocks.forEach(blk => {
                 if(blk.hp > 0 && b.active && collides(b, blk)) {
                   b.active = false; blk.hp--;
                 }
               });
             });
          }
        });

        // Barrier Destruction by Enemies
        if(STATE.phase < 4) {
          barriers.forEach(bar => {
            bar.blocks.forEach(blk => {
              if(blk.hp > 0) {
                grid.enemies.forEach(e => {
                  if(e.alive) {
                    let ex = grid.x + e.c * (e.w + CONFIG.H_GAP);
                    let ey = grid.y + e.r * (e.h + CONFIG.V_GAP);
                    if(collides(blk, {x:ex, y:ey, w:e.w, h:e.h})) blk.hp = 0;
                  }
                });
              }
            });
          });
        }

        // Powerups & Gems update
        powerups.forEach((p, i) => {
          p.y += 1.5 * dt;
          let pRect = {x: player.x - player.w/2, y: player.y - player.h/2, w: player.w, h: player.h};
          if(collides(p, pRect)) {
             collectPowerup(p);
             powerups.splice(i, 1);
          } else if (p.y > CONFIG.HEIGHT) {
             powerups.splice(i, 1);
          }
        });

      } else if (STATE.screen === 'PHASE_CLEAR') {
        STATE.phaseTimer -= dt * 16.67;
        if(STATE.phaseTimer <= 0) initPhase(STATE.phase + 1);
      }
      
      updateEffects(dt);
    }

    function killEnemy(e, ex, ey) {
      e.alive = false;
      let pts = STATE.phase === 1 ? (e.type==='front'?10:20) :
                STATE.phase === 2 ? (e.type==='front'?15:25) :
                (e.type==='front'?20:35);
      score += pts;
      spawnText(ex + 10, ey, `+${pts}`, '#0f0');
      spawnParticles(ex + 15, ey + 10, STATE.phase===1 ? '#8B6914' : (STATE.phase===2?'#888':'#222'), 10);
      playSound(300, 80, 0.15);
      
      STATE.hypeKills++;
      if(STATE.hypeKills > 12) STATE.hypeKills = 12;

      // Drop
      let roll = Math.random();
      if(roll < 0.3) {
         let type = roll < 0.1 ? 'bamboo' : (roll < 0.18 ? 'star' : (roll < 0.25 ? 'clone' : 'pc'));
         powerups.push({x: ex+10, y: ey, w: 20, h: 20, type});
      }
    }

    function damageBoss(amt) {
       boss.hp -= amt;
       playSound(200, 100, 0.1, 'sawtooth');
       spawnParticles(boss.x, boss.y, '#00FFFF', 5);
    }

    function spawnGem() {
      powerups.push({x: Math.random()*(CONFIG.WIDTH-40)+20, y: 300, w: 16, h: 16, type: 'gem', phase: boss.gemsSpawned});
    }

    function collectPowerup(p) {
       playSound(500, 900, 0.15, 'sine');
       if(p.type === 'bamboo') { player.buffs.big += 5; spawnText(p.x, p.y, 'BAMBU+', '#0f0'); }
       else if(p.type === 'star') { player.buffs.spread += 4; spawnText(p.x, p.y, 'NINJA+', '#ff0'); }
       else if(p.type === 'clone') { player.buffs.clone = 1; spawnText(p.x, p.y, 'CLONE', '#ddd'); }
       else if(p.type === 'pc') { player.buffs.shield = 1; spawnText(p.x, p.y, 'SHIELD', '#0ff'); }
       else if(p.type === 'gem') {
         STATE.gemsCollected++;
         spawnText(p.x, p.y, 'GEMA!', '#f0f');
         if(STATE.gemsCollected >= 3) {
            STATE.giantMode = true;
            spawnText(CONFIG.WIDTH/2 - 40, CONFIG.HEIGHT/2, 'PANDA GIGANTE!', '#FFD700');
            triggerFlash('#FFD700', 0.6);
            playSound(200, 800, 0.8, 'sine');
         }
       }
    }

    function playerHit() {
       STATE.lives--;
       STATE.hypeKills = 0;
       player.invuln = 2000;
       triggerShake(6);
       triggerFlash('#ff0000', 0.4);
       playSound(150, 40, 0.35, 'sawtooth', 0.3);
       if(STATE.lives <= 0) gameOver();
    }

    function startPhaseClear() {
      STATE.screen = 'PHASE_CLEAR';
      STATE.phaseTimer = 2000;
      bullets = [];
    }

    function gameOver() {
      STATE.screen = 'GAME_OVER';
      if(score > STATE.highScore) {
        STATE.highScore = score;
        localStorage.setItem('rpi_hs', score);
      }
    }

    function startVictory() {
      STATE.screen = 'VICTORY';
      if(score > STATE.highScore) {
        STATE.highScore = score;
        localStorage.setItem('rpi_hs', score);
      }
    }

    // === 11. RENDER ===
    function render() {
      // BG
      ctx.fillStyle = '#000'; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
      
      if(STATE.phase === 1) {
        ctx.fillStyle = '#F0E8D0'; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
        ctx.fillStyle = '#1a1a1a'; ctx.fillRect(40,20,CONFIG.WIDTH-80, 90);
        ctx.fillStyle = '#C8B890'; ctx.fillRect(0,CONFIG.HEIGHT-30, CONFIG.WIDTH, 30);
      } else if (STATE.phase === 2) {
        let g = ctx.createLinearGradient(0,0,0,CONFIG.HEIGHT);
        g.addColorStop(0, '#87CEEB'); g.addColorStop(1, '#B8E0FF');
        ctx.fillStyle = g; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
        ctx.fillStyle = '#8a9aaa'; ctx.fillRect(20, 200, 80, 180); ctx.fillRect(190, 220, 100, 160);
        ctx.fillStyle = '#4a7c2a'; ctx.fillRect(0,CONFIG.HEIGHT-60, CONFIG.WIDTH, 60);
      } else if (STATE.phase === 3) {
        ctx.fillStyle = '#1a3a0a'; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
        ctx.fillStyle = '#2d6a00'; ctx.fillRect(50, 0, 14, CONFIG.HEIGHT); ctx.fillRect(150, 0, 14, CONFIG.HEIGHT); ctx.fillRect(350, 0, 14, CONFIG.HEIGHT);
      } else if (STATE.phase === 4) {
        ctx.fillStyle = '#001122'; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
        ctx.strokeStyle = '#00FFFF'; ctx.strokeRect(2,2,CONFIG.WIDTH-4,CONFIG.HEIGHT-4);
      }

      ctx.save();
      ctx.translate(screenShake.x, screenShake.y);

      // Barriers
      barriers.forEach(bar => {
         if(!bar.active) return;
         bar.blocks.forEach(blk => {
           if(blk.hp > 0) {
             ctx.fillStyle = STATE.phase===4 ? (blk.hp===2?'#1a4a66':'#0a2a44') : (STATE.phase===3 ? (blk.hp===2?'#3d7a00':'#2a5a00') : (blk.hp===2?'#8B7355':'#5a4a30'));
             ctx.fillRect(blk.x, blk.y, blk.w, blk.h);
             ctx.strokeStyle = '#000'; ctx.strokeRect(blk.x, blk.y, blk.w, blk.h);
           }
         });
      });

      // Enemies
      if(STATE.phase < 4) {
        grid.enemies.forEach(e => {
          if(e.alive) drawEnemy(ctx, grid.x + e.c*(e.w+CONFIG.H_GAP), grid.y + e.r*(e.h+CONFIG.V_GAP), e.type, STATE.phase, e.hp, STATE.frames);
        });
      } else if (boss) {
        // Boss
        ctx.fillStyle = '#0033AA'; ctx.fillRect(boss.x - 80, boss.y - 50, 160, 100);
        ctx.strokeStyle = '#00FFFF'; ctx.lineWidth=3; ctx.strokeRect(boss.x - 80, boss.y - 50, 160, 100);
        ctx.fillStyle = '#00FFFF'; ctx.beginPath(); ctx.arc(boss.x-30, boss.y-10, 10, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(boss.x+30, boss.y-10, 10, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#001166'; ctx.fillRect(boss.x-35, boss.y+15, 70, 20);
        if(boss.hp < 30) { ctx.fillStyle='rgba(255,0,0,0.3)'; ctx.fillRect(boss.x-80, boss.y-50, 160, 100); }
        
        // Boss HP
        ctx.fillStyle = '#220000'; ctx.fillRect(40, 60, CONFIG.WIDTH-80, 10);
        ctx.fillStyle = '#FF4400'; ctx.fillRect(40, 60, (CONFIG.WIDTH-80)*(boss.hp/boss.maxHp), 10);
      }

      // Hype Beam
      if(STATE.hypeActive) {
        ctx.globalAlpha = 0.85 + Math.sin(STATE.frames)*0.1;
        let grad = ctx.createLinearGradient(0, 0, 0, player.y);
        grad.addColorStop(0, '#FFFFFF'); grad.addColorStop(0.5, '#FFD700'); grad.addColorStop(1, '#FF8800');
        ctx.fillStyle = grad;
        ctx.fillRect(player.x - 10, 0, 20, player.y);
        ctx.globalAlpha = 1;
        spawnParticles(player.x, player.y - Math.random()*player.y, '#FFD700', 1);
      }

      // Bullets
      bullets.forEach(b => {
        if(!b.active) return;
        if(b.owner === 'player') {
          ctx.fillStyle = b.pierce ? '#00FF00' : '#228B22';
          ctx.fillRect(b.x, b.y, b.w, b.h);
        } else {
          ctx.fillStyle = STATE.phase === 1 ? '#00FFFF' : (STATE.phase === 2 ? '#FFF' : '#8800FF');
          ctx.beginPath(); ctx.arc(b.x+b.w/2, b.y+b.h/2, b.w/2, 0, Math.PI*2); ctx.fill();
        }
      });

      // Powerups
      powerups.forEach(p => {
         if(p.type === 'gem') {
           ctx.fillStyle = p.phase === 1 ? '#FF2200' : (p.phase === 2 ? '#00FF44' : '#2244FF');
           ctx.save(); ctx.translate(p.x+8, p.y+8 + Math.sin(STATE.frames*0.1)*5); ctx.rotate(Math.PI/4);
           ctx.fillRect(-6, -6, 12, 12); ctx.restore();
         } else {
           ctx.fillStyle = p.type==='bamboo'?'#0f0':p.type==='star'?'#ff0':'#ddd';
           ctx.fillRect(p.x, p.y, p.w, p.h);
         }
      });

      // Player
      if(STATE.screen === 'PLAYING' || STATE.screen === 'PHASE_CLEAR') {
        drawRubi(ctx, player.x, player.y, STATE.giantMode, STATE.frames);
        if(player.buffs.clone > 0) drawRubi(ctx, player.x + 30, player.y, false, STATE.frames, true);
      }

      // Particles & Texts
      particles.forEach(p => {
        ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
      });
      floatingTexts.forEach(ft => {
        ctx.globalAlpha = Math.max(0, ft.life); ctx.fillStyle = ft.color; ctx.font = 'bold 14px Arial';
        ctx.fillText(ft.text, ft.x, ft.y);
      });
      ctx.globalAlpha = 1;

      ctx.restore(); // Fim do shake

      // Flash
      if(flash.alpha > 0) {
        ctx.fillStyle = flash.color; ctx.globalAlpha = flash.alpha;
        ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT); ctx.globalAlpha = 1;
      }

      // HUD
      ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,CONFIG.WIDTH, 52);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 14px monospace';
      ctx.fillText(`SCORE: ${score}`, 10, 20);
      ctx.fillStyle = '#FFD700'; ctx.fillText(`BEST: ${STATE.highScore}`, 10, 40);
      ctx.fillStyle = '#0FF'; ctx.fillText(`FASE ${STATE.phase}/4`, CONFIG.WIDTH/2 - 30, 20);
      
      ctx.fillStyle = '#fff'; ctx.fillText(`VIDAS: ${'♥'.repeat(STATE.lives)}`, CONFIG.WIDTH - 110, 20);

      // HYPE BAR
      ctx.fillStyle = '#222'; ctx.fillRect(CONFIG.WIDTH/2 - 60, 35, 120, 10);
      ctx.fillStyle = '#FFD700'; ctx.fillRect(CONFIG.WIDTH/2 - 60, 35, 120 * (STATE.hypeKills/12), 10);
      if(STATE.hypeKills >= 12 && Math.floor(STATE.frames/10)%2===0) {
         ctx.fillText("SHIFT!", CONFIG.WIDTH/2 + 65, 45);
      }

      // Screens
      if(STATE.screen === 'MENU') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
        ctx.fillStyle = '#FF4400'; ctx.font = 'bold 28px monospace';
        ctx.fillText("RED PANDA INVADERS", 60, 200);
        if(Math.floor(Date.now()/500)%2===0) {
          ctx.fillStyle = '#fff'; ctx.font = '16px monospace';
          ctx.fillText("Pressione ESPAÇO para jogar", 100, 400);
        }
      } else if (STATE.screen === 'PHASE_CLEAR') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
        ctx.fillStyle = '#44FF44'; ctx.font = 'bold 24px monospace';
        ctx.fillText(`FASE ${STATE.phase} CONCLUÍDA!`, 120, 250);
      } else if (STATE.screen === 'GAME_OVER') {
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
        ctx.fillStyle = '#FF2200'; ctx.font = 'bold 36px monospace';
        ctx.fillText("GAME OVER", 140, 250);
        ctx.fillStyle = '#fff'; ctx.font = '18px monospace'; ctx.fillText(`Pontuação: ${score}`, 160, 300);
        ctx.fillText("ESPAÇO para recomeçar", 120, 400);
      } else if (STATE.screen === 'VICTORY') {
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
        ctx.fillStyle = '#FFD700'; ctx.font = 'bold 36px monospace';
        ctx.fillText("VITÓRIA!", 160, 200);
        ctx.fillStyle = '#fff'; ctx.font = '18px monospace'; ctx.fillText("O Sintetizado foi derrotado!", 80, 250);
        ctx.fillText(`Pontuação Final: ${score}`, 130, 300);
        ctx.fillText("ESPAÇO para jogar novamente", 90, 400);
      }
    }

    // === 12. INIT & START ===
    window.addEventListener('keydown', e => {
      if((e.code === 'Space' || e.key === ' ') && STATE.screen !== 'PLAYING' && STATE.screen !== 'PHASE_CLEAR') {
         if(STATE.screen === 'MENU' || STATE.screen === 'GAME_OVER' || STATE.screen === 'VICTORY') {
            score = 0;
            initPhase(1);
            STATE.lives = 3;
            STATE.screen = 'PLAYING';
         }
      }
    });

    requestAnimationFrame(loop);

  </script>
</body>
</html>
