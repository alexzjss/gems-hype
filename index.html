<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RED PANDA INVADERS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
    body {
      background: #050505;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    canvas {
      display: block;
      background: #000;
      image-rendering: pixelated;
      box-shadow: 0 0 20px rgba(255, 50, 50, 0.3);
      max-width: 100vw;
      max-height: 100vh;
      border: 4px solid #333;
    }
    #ui-layer { pointer-events: none; position: absolute; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
    // === 1. CONFIGURAÇÕES ===
    const CONFIG = {
      WIDTH: 560,
      HEIGHT: 700,
      PLAYER_SPEED: 3.5,
      BULLET_SPEED: 8,
      HYPE_MAX: 20,
      FPS: 60,
      GAME_ID: 'red_panda_invaders'
    };

    // === 2. ESTADO GLOBAL ===
    const STATE = {
      screen: 'MENU', // MENU, PLAYING, NEXT_PHASE, GAMEOVER, VICTORY
      phase: 1,
      score: 0,
      highScore: parseInt(localStorage.getItem('rpi_highscore')) || 0,
      lives: 3,
      hypeCount: 0,
      isHypeActive: false,
      hypeTimer: 0,
      shake: 0,
      flashAlpha: 0,
      flashColor: '#fff',
      lastTime: 0,
      keys: {},
      entities: {
        player: null,
        enemies: [],
        bullets: [],
        powerups: [],
        particles: [],
        texts: [],
        barriers: [],
        boss: null
      }
    };

    // === 3. AUDIO ENGINE (Web Audio API) ===
    const AudioEngine = {
      ctx: null,
      init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      },
      play(type) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        const now = this.ctx.currentTime;
        switch(type) {
          case 'shoot':
            osc.type = 'square';
            osc.frequency.setValueAtTime(180, now);
            osc.frequency.exponentialRampToValueAtTime(120, now + 0.08);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.08);
            osc.start(); osc.stop(now + 0.08);
            break;
          case 'hit':
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(40, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
            break;
          case 'hype':
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(80, now);
            osc.frequency.exponentialRampToValueAtTime(1000, now + 0.4);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(); osc.stop(now + 0.4);
            break;
        }
      }
    };

    // === 4. CLASSES & ENTIDADES ===
    class Player {
      constructor() {
        this.w = 44; this.h = 40;
        this.x = CONFIG.WIDTH / 2 - this.w / 2;
        this.y = CONFIG.HEIGHT - 70;
        this.cooldown = 0;
        this.invul = 0;
        this.tailAngle = 0;
      }
      update(delta) {
        if (STATE.keys['ArrowLeft'] || STATE.keys['a']) this.x -= CONFIG.PLAYER_SPEED * delta;
        if (STATE.keys['ArrowRight'] || STATE.keys['d']) this.x += CONFIG.PLAYER_SPEED * delta;
        this.x = Math.max(0, Math.min(CONFIG.WIDTH - this.w, this.x));

        if (this.cooldown > 0) this.cooldown -= delta * 16.6;
        if (this.invul > 0) this.invul -= delta * 16.6;

        if (STATE.keys[' '] && this.cooldown <= 0 && !STATE.isHypeActive) {
          this.shoot();
        }

        this.tailAngle = Math.sin(Date.now() / 200) * 0.3;
      }
      shoot() {
        STATE.entities.bullets.push(new Bullet(this.x + this.w / 2 - 3, this.y, -1));
        this.cooldown = 320;
        AudioEngine.play('shoot');
      }
      draw(ctx) {
        ctx.save();
        if (this.invul > 0 && Math.floor(Date.now() / 100) % 2 === 0) ctx.globalAlpha = 0.3;
        
        // Desenho Procedural Rubi
        ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
        
        // Cauda
        ctx.save();
        ctx.rotate(this.tailAngle);
        ctx.fillStyle = '#cc3300';
        ctx.fillRect(-this.w/2 - 10, 0, 20, 10); // Simplificada para performance
        ctx.restore();

        // Corpo
        ctx.fillStyle = '#cc3300';
        ctx.beginPath();
        ctx.ellipse(0, 0, 22, 16, 0, 0, Math.PI * 2);
        ctx.fill();

        // Cabeça
        ctx.beginPath();
        ctx.arc(0, -15, 15, 0, Math.PI * 2);
        ctx.fill();

        // Olhos
        ctx.fillStyle = '#000';
        ctx.arc(-6, -18, 2, 0, Math.PI * 2);
        ctx.arc(6, -18, 2, 0, Math.PI * 2);
        ctx.fill();

        if (STATE.isHypeActive) {
           ctx.shadowBlur = 15;
           ctx.shadowColor = 'yellow';
           ctx.strokeStyle = 'white';
           ctx.stroke();
        }

        ctx.restore();
      }
    }

    class Enemy {
      constructor(x, y, type, row) {
        this.x = x; this.y = y;
        this.w = 30; this.h = 30;
        this.type = type;
        this.row = row;
        this.hp = type === 'elite' ? 2 : 1;
        this.points = (4 - row) * 10;
      }
      draw(ctx) {
        ctx.fillStyle = this.type === 'elite' ? '#33ccff' : '#8B6914';
        if (STATE.phase === 2) ctx.fillStyle = this.row < 2 ? '#ccc' : '#666';
        if (STATE.phase === 3) ctx.fillStyle = '#000';
        
        ctx.fillRect(this.x, this.y, this.w, this.h);
        // Detalhes de "Bug"
        if (Date.now() % 500 < 100) {
            ctx.fillStyle = 'white';
            ctx.fillRect(this.x + 5, this.y + 5, 2, 2);
        }
      }
    }

    class Bullet {
      constructor(x, y, dir) {
        this.x = x; this.y = y;
        this.w = 6; this.h = 18;
        this.dir = dir; // -1 player, 1 enemy
      }
      update(delta) {
        this.y += this.dir * CONFIG.BULLET_SPEED * delta;
      }
      draw(ctx) {
        ctx.fillStyle = this.dir < 0 ? '#228B22' : '#00ffff';
        ctx.fillRect(this.x, this.y, this.w, this.h);
      }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.color = color;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = (Math.random() - 0.5) * 6;
            this.life = 1.0;
        }
        update(delta) {
            this.x += this.vx * delta;
            this.y += this.vy * delta;
            this.life -= 0.03 * delta;
        }
        draw(ctx) {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, 4, 4);
            ctx.globalAlpha = 1;
        }
    }

    // === 5. LOGICA DO JOGO ===
    function init() {
      const canvas = document.getElementById('gameCanvas');
      canvas.width = CONFIG.WIDTH;
      canvas.height = CONFIG.HEIGHT;
      const ctx = canvas.getContext('2d');

      window.addEventListener('keydown', e => STATE.keys[e.key] = true);
      window.addEventListener('keyup', e => STATE.keys[e.key] = false);
      canvas.addEventListener('mousedown', () => {
          AudioEngine.init();
          if (STATE.screen !== 'PLAYING') startGame();
      });

      requestAnimationFrame(gameLoop);
    }

    function startGame() {
        STATE.screen = 'PLAYING';
        STATE.phase = 1;
        STATE.score = 0;
        STATE.lives = 3;
        STATE.hypeCount = 0;
        resetPhase();
    }

    function resetPhase() {
        STATE.entities.player = new Player();
        STATE.entities.enemies = [];
        STATE.entities.bullets = [];
        STATE.entities.particles = [];
        
        const cols = 10;
        const rows = 4 + (STATE.phase - 1);
        for(let i=0; i<cols; i++) {
            for(let j=0; j<rows; j++) {
                STATE.entities.enemies.push(new Enemy(
                    60 + i * 45, 
                    80 + j * 40, 
                    (j === 0 ? 'elite' : 'normal'),
                    j
                ));
            }
        }
    }

    function update(timestamp) {
      const delta = (timestamp - STATE.lastTime) / 16.67 || 1;
      STATE.lastTime = timestamp;

      if (STATE.screen !== 'PLAYING') return;

      const { player, enemies, bullets, particles } = STATE.entities;

      player.update(delta);

      // Hype Logic
      if (STATE.keys['Shift'] && STATE.hypeCount >= CONFIG.HYPE_MAX && !STATE.isHypeActive) {
          STATE.isHypeActive = true;
          STATE.hypeTimer = 2500;
          STATE.hypeCount = 0;
          AudioEngine.play('hype');
          STATE.shake = 10;
      }

      if (STATE.isHypeActive) {
          STATE.hypeTimer -= delta * 16.6;
          if (STATE.hypeTimer <= 0) STATE.isHypeActive = false;
          
          // Colisão Feixe Hype
          enemies.forEach((en, index) => {
              if (en.x < player.x + player.w/2 + 12 && en.x + en.w > player.x + player.w/2 - 12) {
                  killEnemy(en, index);
              }
          });
      }

      // Bullets Update
      bullets.forEach((b, i) => {
          b.update(delta);
          if (b.y < 0 || b.y > CONFIG.HEIGHT) bullets.splice(i, 1);
          
          // Player Bullets vs Enemies
          if (b.dir < 0) {
              enemies.forEach((en, ei) => {
                  if (checkCollision(b, en)) {
                      bullets.splice(i, 1);
                      killEnemy(en, ei);
                  }
              });
          } else {
              // Enemy Bullets vs Player
              if (checkCollision(b, player) && player.invul <= 0) {
                  bullets.splice(i, 1);
                  hitPlayer();
              }
          }
      });

      // Enemy Movement
      let shiftDown = false;
      let edge = false;
      const speed = (0.8 + (STATE.phase * 0.2)) * delta;
      
      enemies.forEach(en => {
          en.x += speed; // Simplificado: movem apenas para direita neste exemplo base
          if (en.x + en.w > CONFIG.WIDTH || en.x < 0) edge = true;
          
          // Tiro Inimigo
          if (Math.random() < 0.005 + (STATE.phase * 0.002)) {
              bullets.push(new Bullet(en.x + en.w/2, en.y + en.h, 1));
          }
      });

      particles.forEach((p, i) => {
          p.update(delta);
          if (p.life <= 0) particles.splice(i, 1);
      });

      if (enemies.length === 0) {
          STATE.phase++;
          if (STATE.phase > 4) STATE.screen = 'VICTORY';
          else resetPhase();
      }

      if (STATE.shake > 0) STATE.shake *= 0.9;
    }

    function killEnemy(en, index) {
        for(let i=0; i<10; i++) STATE.entities.particles.push(new Particle(en.x + en.w/2, en.y + en.h/2, 'orange'));
        STATE.score += en.points;
        STATE.entities.enemies.splice(index, 1);
        STATE.hypeCount = Math.min(CONFIG.HYPE_MAX, STATE.hypeCount + 1);
        AudioEngine.play('hit');
    }

    function hitPlayer() {
        STATE.lives--;
        STATE.shake = 15;
        STATE.entities.player.invul = 120;
        STATE.hypeCount = 0;
        if (STATE.lives <= 0) STATE.screen = 'GAMEOVER';
    }

    function checkCollision(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function render() {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

      ctx.save();
      if (STATE.shake > 0) ctx.translate((Math.random()-0.5)*STATE.shake, (Math.random()-0.5)*STATE.shake);

      if (STATE.screen === 'MENU') {
          drawText(ctx, "RED PANDA INVADERS", CONFIG.WIDTH/2, 200, 40, "red");
          drawText(ctx, "CLIQUE PARA INICIAR", CONFIG.WIDTH/2, 400, 20, "white");
      } else if (STATE.screen === 'PLAYING') {
          // BG
          ctx.fillStyle = STATE.phase === 1 ? '#f5f0e0' : (STATE.phase === 2 ? '#87CEEB' : '#1a2e00');
          ctx.fillRect(0,0, CONFIG.WIDTH, CONFIG.HEIGHT);

          STATE.entities.player.draw(ctx);
          STATE.entities.enemies.forEach(en => en.draw(ctx));
          STATE.entities.bullets.forEach(b => b.draw(ctx));
          STATE.entities.particles.forEach(p => p.draw(ctx));

          if (STATE.isHypeActive) {
              const p = STATE.entities.player;
              const grad = ctx.createLinearGradient(p.x + p.w/2 - 12, 0, p.x + p.w/2 + 12, 0);
              grad.addColorStop(0, 'orange'); grad.addColorStop(0.5, 'white'); grad.addColorStop(1, 'orange');
              ctx.fillStyle = grad;
              ctx.fillRect(p.x + p.w/2 - 12, 0, 24, p.y);
          }

          // HUD
          drawHUD(ctx);
      } else if (STATE.screen === 'GAMEOVER') {
          drawText(ctx, "GAME OVER", CONFIG.WIDTH/2, 300, 50, "red");
          drawText(ctx, `SCORE: ${STATE.score}`, CONFIG.WIDTH/2, 400, 30, "white");
      }

      ctx.restore();
    }

    function drawHUD(ctx) {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, CONFIG.WIDTH, 50);
        drawText(ctx, `SCORE: ${STATE.score}`, 80, 30, 18, "white");
        drawText(ctx, `LIVES: ${"♥".repeat(STATE.lives)}`, CONFIG.WIDTH - 80, 30, 18, "red");
        
        // Hype Bar
        ctx.fillStyle = "#333";
        ctx.fillRect(CONFIG.WIDTH/2 - 100, 20, 200, 15);
        ctx.fillStyle = STATE.hypeCount >= CONFIG.HYPE_MAX ? "orange" : "yellow";
        ctx.fillRect(CONFIG.WIDTH/2 - 100, 20, (STATE.hypeCount / CONFIG.HYPE_MAX) * 200, 15);
        if (STATE.hypeCount >= CONFIG.HYPE_MAX) drawText(ctx, "HYPE PRONTO!", CONFIG.WIDTH/2, 48, 12, "orange");
    }

    function drawText(ctx, text, x, y, size, color) {
        ctx.fillStyle = color;
        ctx.font = `bold ${size}px Courier New`;
        ctx.textAlign = "center";
        ctx.fillText(text, x, y);
    }

    function gameLoop(timestamp) {
      update(timestamp);
      render();
      requestAnimationFrame(gameLoop);
    }

    init();
  </script>
</body>
</html>
